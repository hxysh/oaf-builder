name: Build OpenAppFilter aarch64_generic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dynamic Environment
        run: |
          echo "ARCH=aarch64_generic" >> $GITHUB_ENV
          echo "VERSION=25.12.4" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gawk gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget zstd

      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.4/targets/armsr/armv8/openwrt-sdk-25.12.4-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          wget -qO sdk.tar.zst "$SDK_URL" || wget -qO sdk.tar.zst "https://downloads.openwrt.org/snapshots/targets/armsr/armv8/openwrt-sdk-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          tar -xf sdk.tar.zst --strip-components=1
          rm sdk.tar.zst
          
      - name: Clone OpenAppFilter Source
        run: |
          git clone https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter

      - name: Compile Single Package
        run: |
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          echo "CONFIG_PACKAGE_luci-app-oaf=y" >> .config
          make defconfig
          
          make package/oaf/compile V=s -j$(nproc)
          make package/open-app-filter/compile V=s -j$(nproc)
          make package/luci-app-oaf/compile V=s -j$(nproc)

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openappfilter-apks
          path: |
            bin/packages/aarch64_generic/**/*oaf*.apk
            bin/packages/aarch64_generic/**/appfilter*.apk
            bin/targets/armsr/armv8/**/*oaf*.apk
